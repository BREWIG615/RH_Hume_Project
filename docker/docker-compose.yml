# =============================================================================
# RH Hume Project - Docker Compose Configuration
# Contested Logistics Intelligence Platform
# =============================================================================
#
# Usage:
#   Start all services:     docker compose up -d
#   Stop all services:      docker compose down
#   View logs:              docker compose logs -f [service]
#   Reset with volumes:     docker compose down -v
#
# Access Points:
#   - Kafka UI:       http://localhost:8080
#   - Neo4j Browser:  http://localhost:7474
#   - Agent API:      http://localhost:8000
#   - API Docs:       http://localhost:8000/docs
#
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # INFRASTRUCTURE SERVICES
  # ===========================================================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: rh_zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - hume_network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rh_kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - hume_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.1
    container_name: rh_kafka_ui
    hostname: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: hume-logistics
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_READONLY: "false"
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - hume_network
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15.0-community
    container_name: rh_neo4j
    hostname: neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "512m"
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "gds.*,apoc.*"
      # Performance tuning
      NEO4J_server_memory_pagecache_size: "512M"
      NEO4J_server_memory_heap_initial__size: "512M"
      NEO4J_server_memory_heap_max__size: "2G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - neo4j_import:/var/lib/neo4j/import
    networks:
      - hume_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ===========================================================================
  # INITIALIZATION SERVICES (run once)
  # ===========================================================================

  kafka-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jobs
    container_name: rh_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    command: ["python", "-m", "src.kafka.init_topics"]
    networks:
      - hume_network
    restart: "no"
    profiles:
      - init

  neo4j-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jobs
    container_name: rh_neo4j_init
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
    command: ["python", "-m", "src.loaders.init_neo4j"]
    networks:
      - hume_network
    restart: "no"
    profiles:
      - init

  # ===========================================================================
  # APPLICATION SERVICES
  # ===========================================================================

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: rh_api
    hostname: api
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # API Keys (from .env file)
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      HUME_API_KEY: ${HUME_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # App Config
      APP_ENVIRONMENT: development
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ../data:/app/data
      - ../config:/app/config:ro
    networks:
      - hume_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  consumers:
    build:
      context: ..
      dockerfile: docker/Dockerfile.consumers
    container_name: rh_consumers
    hostname: consumers
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # API Keys
      HUME_API_KEY: ${HUME_API_KEY}
      # App Config
      APP_ENVIRONMENT: development
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ../data:/app/data
      - ../config:/app/config:ro
    networks:
      - hume_network
    restart: unless-stopped
    profiles:
      - consumers

  # ===========================================================================
  # BATCH JOBS (run on-demand)
  # ===========================================================================

  jobs:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jobs
    container_name: rh_jobs
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # API Keys
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      HUME_API_KEY: ${HUME_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # App Config
      APP_ENVIRONMENT: development
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ../data:/app/data
      - ../config:/app/config:ro
    networks:
      - hume_network
    profiles:
      - jobs

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  hume_network:
    name: rh_hume_network
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  zookeeper_data:
    name: rh_zookeeper_data
  zookeeper_logs:
    name: rh_zookeeper_logs
  kafka_data:
    name: rh_kafka_data
  neo4j_data:
    name: rh_neo4j_data
  neo4j_logs:
    name: rh_neo4j_logs
  neo4j_plugins:
    name: rh_neo4j_plugins
  neo4j_import:
    name: rh_neo4j_import
